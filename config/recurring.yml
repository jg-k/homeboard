production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Sync theCrag ascents for all connected users (weekly)
  thecrag_sync_all:
    class: ThecragSyncAllJob
    schedule: at 5am every monday

  # Sync Boardsesh ticks (kilter/tension) for all connected users
  boardsesh_sync_all:
    class: BoardseshSyncAllJob
    schedule: at 11pm every day
